<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunset di Kebun 2026</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #000;
    color: white;
    text-align: center;
}

.hero {
    background: url('crowd.jpg') center/cover no-repeat;
    height: 100vh;
    position: relative;
}

.overlay {
    background: rgba(0, 140, 200, 0.6);
    position: absolute;
    width: 100%;
    height: 100%;
}

.content {
    position: relative;
    top: 30%;
}

h1 {
    font-size: 50px;
    margin: 0;
}

.cities {
    margin-top: 40px;
}

.cities img {
    width: 150px;
    margin: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.cities img:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<div class="hero">
    <div class="overlay"></div>

    <div class="content">
        <h1>SUNSET DI KEBUN 2026</h1>

        <div class="cities">
            <a href="#bogor">
                <img src="bogor.png" alt="Bogor">
            </a>

            <a href="#jakarta">
                <img src="jakarta.png" alt="Jakarta">
            </a>

            <a href="#bali">
                <img src="bali.png" alt="Bali">
            </a>
        </div>
    </div>
</div>

<section id="bogor" style="height:100vh; background:#111;">
    <h2>Bogor Event</h2>
</section>

<section id="jakarta" style="height:100vh; background:#222;">
    <h2>Jakarta Event</h2>
</section>

<section id="bali" style="height:100vh; background:#333;">
    <h2>Bali Event</h2>
</section>

</body>
</html>
